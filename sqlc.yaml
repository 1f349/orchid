version: "2"
sql:
  - engine: sqlite
    queries: database/queries
    schema: database/migrations
    gen:
      go:
        package: "database"
        out: "database"
        emit_json_tags: true
        overrides:
          - column: certificates.not_after
            go_type: github.com/gobuffalo/nulls.Time
          - column: certificates.renew_retry
            go_type: github.com/gobuffalo/nulls.Time
          - column: agents.last_sync
            go_type: github.com/gobuffalo/nulls.Time
          - column: agent_certs.not_after
            go_type: github.com/gobuffalo/nulls.Time
          - column: certificates.dns
            go_type: github.com/gobuffalo/nulls.Int64
          - column: certificates.authority
            go_type: github.com/1f349/orchid/database/types.Authority
